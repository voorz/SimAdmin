name: Build-OTA-Package

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.arch }})
    strategy:
      matrix:
        include:
          - runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-musl
            arch: arm64
          - runner: ubuntu-24.04
            target: x86_64-unknown-linux-musl
            arch: amd64
    runs-on: ${{ matrix.runner }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read version from tag
        id: version
        run: |
          TAG_NAME="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG_NAME#v}"
          CURRENT_VERSION=$(cat VERSION | tr -d '[:space:]')
          if [ -z "$VERSION" ]; then
            echo "Error: could not extract version from tag $TAG_NAME"
            exit 1
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "current_version=$CURRENT_VERSION" >> $GITHUB_OUTPUT
          echo "Build version: $VERSION (${{ matrix.arch }})"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install musl toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools
          musl-gcc --version

      - name: Install UPX
        run: |
          sudo apt-get install -y upx-ucl
          upx --version

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            backend/target/
          key: ${{ matrix.arch }}-musl-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ matrix.arch }}-musl-cargo-

      - name: Sync version numbers
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          printf "%s\n" "$VERSION" > VERSION
          sed -i "s/^version = \"[^\"]*\"/version = \"$VERSION\"/" backend/Cargo.toml
          sed -i "s/\"version\": \"[^\"]*\"/\"version\": \"$VERSION\"/" frontend/package.json

      - name: Build backend
        working-directory: backend
        run: |
          TARGET_UPPER=$(echo ${{ matrix.target }} | tr '[:lower:]-' '[:upper:]_')
          export CC_${TARGET_UPPER}=musl-gcc
          export CARGO_TARGET_${TARGET_UPPER}_LINKER=musl-gcc
          export SQLITE3_STATIC=1
          export LIBSQLITE3_SYS_USE_PKG_CONFIG=0
          cargo build --release --target ${{ matrix.target }}
          BINARY_PATH="target/${{ matrix.target }}/release/simadmin"
          ls -lh "$BINARY_PATH"
          file "$BINARY_PATH"

      - name: Compress binary with UPX
        run: |
          BINARY_PATH="backend/target/${{ matrix.target }}/release/simadmin"
          BEFORE_SIZE=$(stat -c%s "$BINARY_PATH")
          upx --best --lzma "$BINARY_PATH"
          AFTER_SIZE=$(stat -c%s "$BINARY_PATH")
          RATIO=$(echo "scale=1; 100 - ($AFTER_SIZE * 100 / $BEFORE_SIZE)" | bc)
          echo "Compression saved: ${RATIO}%"
          ls -lh "$BINARY_PATH"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: |
            ~/.local/share/pnpm/store
          key: ${{ matrix.arch }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ matrix.arch }}-pnpm-store-

      - name: Build frontend
        working-directory: frontend
        run: |
          pnpm install --frozen-lockfile
          pnpm run build
          ls -lh dist/

      - name: Package OTA
        id: package
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          COMMIT=$(git rev-parse --short HEAD)
          BUILD_TIME=$(TZ=Asia/Shanghai date +"%Y-%m-%dT%H:%M:%S+08:00")
          ARCH="${{ matrix.arch }}"
          BINARY_PATH="backend/target/${{ matrix.target }}/release/simadmin"
          FRONTEND_DIR="frontend/dist"

          OTA_TMP=$(mktemp -d)
          cp "$BINARY_PATH" "$OTA_TMP/simadmin"
          chmod 755 "$OTA_TMP/simadmin"
          BINARY_MD5=$(md5sum "$OTA_TMP/simadmin" | cut -d' ' -f1)

          mkdir -p "$OTA_TMP/www"
          cp -r "$FRONTEND_DIR"/* "$OTA_TMP/www/"
          FRONTEND_MD5=$(find "$OTA_TMP/www" -type f -exec md5sum {} \; | cut -d' ' -f1 | sort | md5sum | cut -d' ' -f1)

          cat > "$OTA_TMP/meta.json" << EOF
          {
              "version": "$VERSION",
              "commit": "$COMMIT",
              "build_time": "$BUILD_TIME",
              "binary_md5": "$BINARY_MD5",
              "frontend_md5": "$FRONTEND_MD5",
              "arch": "$ARCH"
          }
          EOF

          mkdir -p release
          OTA_FILE="release/simadmin_v${VERSION}_linux_${ARCH}.tar.gz"
          cd "$OTA_TMP"
          tar -czf "$GITHUB_WORKSPACE/$OTA_FILE" meta.json simadmin www
          cd "$GITHUB_WORKSPACE"

          OTA_MD5=$(md5sum "$OTA_FILE" | cut -d' ' -f1)
          OTA_SHA256=$(sha256sum "$OTA_FILE" | cut -d' ' -f1)

          echo "ota_file=$OTA_FILE" >> $GITHUB_OUTPUT
          echo "ota_md5=$OTA_MD5" >> $GITHUB_OUTPUT
          echo "ota_sha256=$OTA_SHA256" >> $GITHUB_OUTPUT
          echo "build_time=$BUILD_TIME" >> $GITHUB_OUTPUT

          ls -lh "$OTA_FILE"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ota-${{ matrix.arch }}
          path: release/*.tar.gz

      - name: Build Summary
        run: |
          echo "## Build ${{ matrix.arch }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Item | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Version | ${{ steps.version.outputs.version }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Arch | ${{ matrix.target }} |" >> $GITHUB_STEP_SUMMARY
          echo "| File | \`${{ steps.package.outputs.ota_file }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| MD5 | \`${{ steps.package.outputs.ota_md5 }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| SHA-256 | \`${{ steps.package.outputs.ota_sha256 }}\` |" >> $GITHUB_STEP_SUMMARY

  release:
    name: Publish Release
    needs: build
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Read version from tag
        id: version
        run: |
          TAG_NAME="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG_NAME#v}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "commit=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release
          merge-multiple: true

      - name: Calculate checksums
        id: checksums
        run: |
          cd release
          AARCH64_FILE=$(ls *linux_arm64*.tar.gz 2>/dev/null || echo "")
          X86_64_FILE=$(ls *linux_amd64*.tar.gz 2>/dev/null || echo "")

          if [ -n "$AARCH64_FILE" ]; then
            AARCH64_MD5=$(md5sum "$AARCH64_FILE" | cut -d' ' -f1)
            AARCH64_SHA256=$(sha256sum "$AARCH64_FILE" | cut -d' ' -f1)
            echo "aarch64_file=$AARCH64_FILE" >> $GITHUB_OUTPUT
            echo "aarch64_md5=$AARCH64_MD5" >> $GITHUB_OUTPUT
            echo "aarch64_sha256=$AARCH64_SHA256" >> $GITHUB_OUTPUT
          fi

          if [ -n "$X86_64_FILE" ]; then
            X86_64_MD5=$(md5sum "$X86_64_FILE" | cut -d' ' -f1)
            X86_64_SHA256=$(sha256sum "$X86_64_FILE" | cut -d' ' -f1)
            echo "x86_64_file=$X86_64_FILE" >> $GITHUB_OUTPUT
            echo "x86_64_md5=$X86_64_MD5" >> $GITHUB_OUTPUT
            echo "x86_64_sha256=$X86_64_SHA256" >> $GITHUB_OUTPUT
          fi

          BUILD_TIME=$(TZ=Asia/Shanghai date +"%Y-%m-%dT%H:%M:%S+08:00")
          echo "build_time=$BUILD_TIME" >> $GITHUB_OUTPUT

      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/*.tar.gz
          overwrite_files: true
          generate_release_notes: false
          body: |
            ## OTA Package

            ### Version Info

            - **Version**: ${{ steps.version.outputs.version }}
            - **Commit**: ${{ steps.version.outputs.commit }}
            - **Build Time**: ${{ steps.checksums.outputs.build_time }}

            ### Artifacts

            | File | Arch | Target Platform | MD5 | SHA-256 |
            |------|------|----------------|-----|---------|
            | `${{ steps.checksums.outputs.aarch64_file }}` | arm64 | ARM64 devices (CPE, routers, edge gateways) | `${{ steps.checksums.outputs.aarch64_md5 }}` | `${{ steps.checksums.outputs.aarch64_sha256 }}` |
            | `${{ steps.checksums.outputs.x86_64_file }}` | amd64 | x86 servers, dev machines, WSL | `${{ steps.checksums.outputs.x86_64_md5 }}` | `${{ steps.checksums.outputs.x86_64_sha256 }}` |

            ### System Requirements

            **Supported OS**: Debian 11+, Ubuntu 20.04+, or any Linux distribution with:

            - **systemd** — service management
            - **D-Bus** — IPC bus for ModemManager and NetworkManager
            - **ModemManager** + `mmcli` — modem abstraction layer
            - **NetworkManager** + `nmcli` — network management

            > SimAdmin communicates with modems through ModemManager's D-Bus API, not via direct AT commands.
            > This is why Debian/Ubuntu (which ship these services by default) are the primary targets.
            > Distributions without these services (e.g. OpenWrt, Alpine) require significant adaptation.

            ### Quick Install

            ```bash
            curl -fsSL https://raw.githubusercontent.com/voorz/SimAdmin/main/install_latest.sh | sh
            ```
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
